<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋找協助：藥酒癮醫療與復健資源地圖</title>
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdnjs.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://unpkg.com;
        img-src 'self' data: https://*.basemaps.cartocdn.com https://unpkg.com;
        connect-src 'self' https://*.basemaps.cartocdn.com;
        object-src 'none';
        base-uri 'self';
    ">
    
    <link rel="stylesheet" href="./output.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" crossorigin="anonymous" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        .leaflet-popup-content-wrapper { border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .leaflet-popup-content { margin: 16px; font-family: inherit; }
        .leaflet-control-container .leaflet-top { z-index: 999; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden bg-slate-50 text-slate-800 font-sans">

    <button id="openSidebarBtn" aria-label="開啟選單" class="md:hidden absolute top-4 left-4 z-[1000] bg-white p-3 rounded-full shadow-lg text-blue-600 border border-slate-200 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </button>

    <aside id="sidebar" class="w-80 h-full flex flex-col bg-white border-r border-slate-200 shadow-2xl md:shadow-none z-[1001] absolute md:relative transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        
        <div class="p-5 border-b border-slate-200 bg-blue-700 text-white flex justify-between items-start">
            <div>
                <h1 class="text-xl font-bold tracking-wide">藥酒癮醫療與復健資源地圖</h1>
                <p class="text-sm text-blue-100 mt-1">尋找離您最近的專業協助</p>
            </div>
            <button id="closeSidebarBtn" aria-label="關閉選單" class="md:hidden text-blue-100 hover:text-white p-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="p-4 bg-blue-50 border-b border-slate-200 text-sm leading-relaxed">
            <p class="font-semibold text-blue-800 mb-1.5 flex items-center">
                <span class="mr-1">💡</span> 快速上手指南
            </p>
            <ul class="space-y-1.5 text-blue-700/90 pl-1">
                <li class="flex items-start"><span class="mr-1.5 opacity-70">1.</span> 選擇您所在的<b>縣市</b>以縮小範圍。</li>
                <li class="flex items-start"><span class="mr-1.5 opacity-70">2.</span> 勾選下方需要的<b>特定服務</b>。</li>
                <li class="flex items-start"><span class="mr-1.5 opacity-70">3.</span> 點擊地圖上的標記，查看機構聯絡方式。</li>
            </ul>
        </div>

        <div id="upload-container" class="p-4 border-b border-slate-200 bg-amber-50">
            <div id="status-message" class="text-sm font-medium text-amber-700 mb-2 flex items-center">
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-amber-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span>系統正在載入最新資料...</span>
            </div>
            <div class="mt-3 space-y-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">備援：手動上傳機構名單 (CSV)</label>
                    <input type="file" id="csvFileInput" accept=".csv" aria-label="上傳機構名單 CSV" class="block w-full text-sm text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-800 hover:file:bg-amber-200 cursor-pointer" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">備援：手動上傳縣市界線 (JSON)</label>
                    <input type="file" id="jsonFileInput" accept=".json" aria-label="上傳縣市界線 JSON" class="block w-full text-sm text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-amber-100 file:text-amber-800 hover:file:bg-amber-200 cursor-pointer" />
                </div>
            </div>
        </div>

        <div class="p-4 flex-1 overflow-y-auto">
            <div class="mb-4">
                <h2 class="text-base font-bold text-slate-700">我們能幫上什麼忙？</h2>
                <p class="text-[13px] text-slate-500 mt-0.5">請告訴我們您的位置與需求，系統會為您篩選合適的機構。</p>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-medium text-slate-600 mb-1">您所在的縣市</label>
                <select id="countyFilter" aria-label="選擇縣市" class="w-full rounded-md border border-slate-300 p-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none bg-slate-50">
                    <option value="all">全台灣 (載入中...)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 mb-2">需要的特定服務 (可複選)</label>
                <div id="serviceFilters" class="space-y-2.5 text-sm">
                    <p id="serviceLoadingText" class="text-slate-400 italic text-xs">等待資料載入中...</p>
                </div>
            </div>
        </div>

        <div class="border-t border-slate-200 bg-slate-50">
            <div class="p-4 border-b border-slate-200">
                <div class="flex flex-col mb-3 text-sm">
                    <span class="text-slate-600 font-medium mb-1">符合條件的機構數量：</span>
                    <div id="resultCountContainer" class="flex flex-col">
                         <span id="resultCountNumber" class="font-bold text-xl text-blue-600">0</span>
                         <span id="resultHint" class="text-[13px] text-slate-500 font-normal mt-1 leading-relaxed hidden">建議您減少勾選特定的服務項目，或選擇「全台灣」來尋找其他縣市的資源。</span>
                    </div>
                </div>
                <button id="resetBtn" class="w-full py-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-medium rounded-md transition-colors text-sm shadow-sm">
                    重新設定篩選條件
                </button>
            </div>
            
            <div class="p-3 text-[11px] leading-relaxed text-slate-500 bg-slate-100">
                <p class="mb-1 font-semibold text-slate-600">資料來源：</p>
                <p>衛福部心健司 - 物質使用障礙症治療及生活重建業務指定機構名單</p>
                <p class="mt-1">資料更新時間：115.3.13</p>
            </div>
        </div>
    </aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/50 z-[1000] hidden md:hidden transition-opacity"></div>

    <main class="flex-1 relative z-0">
        <div id="map" class="h-full w-full"></div>
    </main>

    <script>
        // --- 核心資安防護：進階資料淨化 (Sanitize Pipeline) ---
        const MAX_STRING_LENGTH = 150; 
        
        function sanitizeText(str) {
            if (str === null || str === undefined) return '';
            let s = String(str).substring(0, MAX_STRING_LENGTH); 
            return s.replace(/[&<>"']/g, function(match) {
                const escapeMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
                return escapeMap[match];
            });
        }

        // 全局變數
        let map, markerClusterGroup, countyBoundaryLayer;
        let globalData = [];
        let serviceColumns = [];
        let isInitialLoad = true; 
        let countyGeoJsonData = null; 
        const MAX_FILE_SIZE = 2 * 1024 * 1024; // 限制檔案最大 2MB

        // DOM 元素快取
        const statusEl = document.getElementById('status-message');
        const countySelect = document.getElementById('countyFilter');
        const serviceContainer = document.getElementById('serviceFilters');
        const resultCountNumber = document.getElementById('resultCountNumber');
        const resultHint = document.getElementById('resultHint');
        const resetBtn = document.getElementById('resetBtn');

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            setupEventListeners();
            autoLoadCSV();
            loadCountyBoundaries();
        });

        function initMap() {
            // 加入地圖邊界限制，防止拖曳過頭
            const taiwanBounds = L.latLngBounds(L.latLng(21.5, 118.0), L.latLng(25.5, 122.5));
            map = L.map('map', {
                zoomControl: false,
                maxBounds: taiwanBounds,
                maxBoundsViscosity: 1.0,
                minZoom: 7
            }).setView([23.6978, 120.9605], 8);
            
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd', maxZoom: 20
            }).addTo(map);

            markerClusterGroup = L.markerClusterGroup({
                chunkedLoading: true, spiderfyOnMaxZoom: true, showCoverageOnHover: false
            });
            map.addLayer(markerClusterGroup);
        }

        function updateStatus(msg, isError = false) {
            // 完全避免 innerHTML，改用 textContent
            statusEl.textContent = msg;
            statusEl.className = isError ? "text-sm font-bold text-red-500 mb-2" : "text-sm font-medium text-blue-600 mb-2";
        }

        function checkAllDataLoaded() {
            if (globalData.length > 0 && countyGeoJsonData) {
                document.getElementById('upload-container').style.display = 'none';
            }
        }

        function autoLoadCSV() {
            fetch('drug_org_list_all_1150313.csv')
                .then(res => { if (!res.ok) throw new Error(); return res.text(); })
                .then(text => { parseAndProcessCSV(text); checkAllDataLoaded(); })
                .catch(e => updateStatus('✘ CSV 載入失敗，請手動上傳', true));
        }

        function loadCountyBoundaries() {
            fetch('COUNTY_MOI_1140318.json')
                .then(res => res.json())
                .then(data => {
                    // GeoJSON 深層驗證與淨化
                    if (!data || !data.features || !Array.isArray(data.features)) {
                        throw new Error('Invalid GeoJSON structure');
                    }
                    data.features.forEach(feature => {
                        if (feature.properties && typeof feature.properties === 'object') {
                             if (feature.properties.COUNTYNAME) {
                                 feature.properties.COUNTYNAME = sanitizeText(feature.properties.COUNTYNAME);
                             }
                        }
                    });
                    countyGeoJsonData = data;
                    drawBoundaries('all'); 
                    checkAllDataLoaded();
                })
                .catch(e => updateStatus('✘ 縣市界載入失敗，請手動上傳', true));
        }

        function parseAndProcessCSV(csvString) {
            Papa.parse(csvString, {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    if (results.errors.length > 0) {
                        updateStatus('✘ CSV 檔案解析錯誤', true); return;
                    }
                    // CSV Schema 驗證
                    const cols = results.meta.fields || [];
                    const reqCols = ['機構名稱', '縣市'];
                    if (!reqCols.every(c => cols.includes(c))) {
                         updateStatus('✘ CSV 缺少必要欄位', true); return;
                    }
                    globalData = results.data;
                    buildFilters(globalData);
                    renderMap();
                }
            });
        }

        // --- 徹底使用原生 DOM API 構建側邊欄，零 innerHTML ---
        function buildFilters(data) {
            const counties = new Set();
            const columns = Object.keys(data[0] || {});
            serviceColumns = columns.filter(col => col.startsWith('藥癮_') || col.startsWith('酒癮_'));

            data.forEach(row => { if (row['縣市']) counties.add(row['縣市']); });

            const currentSelection = countySelect.value;
            while (countySelect.firstChild) countySelect.removeChild(countySelect.firstChild);
            
            const allOpt = document.createElement('option');
            allOpt.value = 'all'; allOpt.textContent = '全台灣所有縣市';
            countySelect.appendChild(allOpt);

            Array.from(counties).sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = sanitizeText(c); opt.textContent = sanitizeText(c);
                countySelect.appendChild(opt);
            });
            if(counties.has(currentSelection)) countySelect.value = currentSelection;

            const loadingText = document.getElementById('serviceLoadingText');
            if(loadingText) {
                serviceContainer.removeChild(loadingText);
                serviceColumns.forEach(service => {
                    const safeValue = sanitizeText(service);
                    const displayName = sanitizeText(service.replace('_', '：'));
                    
                    const label = document.createElement('label');
                    label.className = "flex items-start space-x-3 cursor-pointer hover:bg-slate-100 p-2 rounded-md transition-colors border border-transparent hover:border-slate-200";
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.value = safeValue;
                    checkbox.className = "service-checkbox mt-0.5 h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500";
                    checkbox.addEventListener('change', debounceRenderMap); 
                    
                    const span = document.createElement('span');
                    span.className = "text-slate-700 leading-tight";
                    span.textContent = displayName;

                    label.appendChild(checkbox);
                    label.appendChild(span);
                    serviceContainer.appendChild(label);
                });
            }
        }

        function drawBoundaries(selectedCountyName) {
            if (!countyGeoJsonData) return;
            if (countyBoundaryLayer) map.removeLayer(countyBoundaryLayer);

            countyBoundaryLayer = L.geoJSON(countyGeoJsonData, {
                filter: feature => (selectedCountyName === 'all' || feature.properties.COUNTYNAME === selectedCountyName),
                style: feature => ({
                    color: "#64748b", weight: 2.5, opacity: 0.7,
                    fillColor: "#3b82f6", fillOpacity: selectedCountyName === 'all' ? 0.02 : 0.08 
                })
            }).addTo(map);

            if (selectedCountyName !== 'all') {
                const bounds = countyBoundaryLayer.getBounds();
                if (bounds.isValid()) {
                    const isMobile = window.innerWidth < 768;
                    map.fitBounds(bounds, {
                        paddingTopLeft: isMobile ? [10, 60] : [20, 20],
                        paddingBottomRight: [20, 20], maxZoom: 13
                    });
                }
            } else if (!isInitialLoad) {
                map.setView([23.6978, 120.9605], 8);
            }
        }

        // --- Debounce 防抖，避免連續點擊卡死 ---
        let renderTimer;
        function debounceRenderMap() {
            clearTimeout(renderTimer);
            renderTimer = setTimeout(renderMap, 200);
        }

        function renderMap() {
            if (!globalData || globalData.length === 0) return;
            markerClusterGroup.clearLayers();

            const selectedCounty = countySelect.value;
            const checkedCheckboxes = document.querySelectorAll('.service-checkbox:checked');
            const checkedServices = Array.from(checkedCheckboxes).map(cb => cb.value);

            drawBoundaries(selectedCounty);
            let validCount = 0;

            globalData.forEach(row => {
                const lat = parseFloat(row['緯度 (lat)'] || row['緯度'] || row['lat']);
                const lng = parseFloat(row['經度 (lng)'] || row['經度'] || row['lng']);
                if (isNaN(lat) || isNaN(lng)) return;
                if (selectedCounty !== 'all' && row['縣市'] !== selectedCounty) return;

                const hasAllServices = checkedServices.every(service => row[service] === 'V');
                if (!hasAllServices) return;

                validCount++;

                // --- 徹底使用 DOM API 建立 Leaflet Popup 內容 ---
                const popupContainer = document.createElement('div');
                popupContainer.className = "min-w-[220px]";

                const title = document.createElement('h3');
                title.className = "font-bold text-blue-800 text-[17px] mb-2 leading-tight";
                title.textContent = sanitizeText(row['機構名稱'] || '未命名機構');
                popupContainer.appendChild(title);

                const infoBox = document.createElement('div');
                infoBox.className = "bg-slate-50 p-2 rounded-md border border-slate-100 text-sm space-y-2 text-slate-700 mb-3";
                
                const addrP = document.createElement('p');
                addrP.className = "flex items-start";
                const addrIcon = document.createElement('span');
                addrIcon.className = "mr-1.5 mt-0.5";
                addrIcon.textContent = "📍";
                const addrText = document.createElement('span');
                addrText.textContent = `${sanitizeText(row['縣市'] || '')} ${sanitizeText(row['機構地址'] || '')}`;
                addrP.appendChild(addrIcon);
                addrP.appendChild(addrText);
                infoBox.appendChild(addrP);

                const phoneVal = row['聯絡電話'];
                if(phoneVal) {
                    const phoneP = document.createElement('p');
                    phoneP.className = "flex items-center";
                    const phoneIcon = document.createElement('span');
                    phoneIcon.className = "mr-1.5";
                    phoneIcon.textContent = "📞";
                    
                    const phoneLink = document.createElement('a');
                    const cleanPhone = phoneVal.replace(/[^\d+()#-]/g, ''); 
                    phoneLink.href = `tel:${cleanPhone}`;
                    phoneLink.className = "text-blue-600 font-medium hover:underline";
                    phoneLink.textContent = sanitizeText(phoneVal);
                    
                    phoneP.appendChild(phoneIcon);
                    phoneP.appendChild(phoneLink);
                    infoBox.appendChild(phoneP);
                }
                popupContainer.appendChild(infoBox);

                const tagContainer = document.createElement('div');
                const tagLabel = document.createElement('b');
                tagLabel.className = "text-[11px] text-slate-500 mb-1.5 block";
                tagLabel.textContent = "此機構提供之服務：";
                tagContainer.appendChild(tagLabel);

                const tagFlex = document.createElement('div');
                tagFlex.className = "flex flex-wrap gap-1.5";
                
                serviceColumns.forEach(service => {
                    if (row[service] === 'V') {
                        const isDrug = service.startsWith('藥癮');
                        const shortName = sanitizeText(service.split('_')[1] || service);
                        const badgeStyle = isDrug ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-orange-50 text-orange-700 border-orange-200';
                        
                        const span = document.createElement('span');
                        span.className = `px-2 py-1 text-[11px] rounded-md ${badgeStyle} border font-medium`;
                        span.textContent = shortName;
                        tagFlex.appendChild(span);
                    }
                });
                tagContainer.appendChild(tagFlex);
                popupContainer.appendChild(tagContainer);

                const marker = L.marker([lat, lng]);
                marker.bindPopup(L.popup().setContent(popupContainer));
                markerClusterGroup.addLayer(marker);
            });

            // 更新結果數量 (避免 innerHTML)
            resultCountNumber.textContent = validCount;
            if (validCount === 0) {
                resultCountNumber.className = "font-bold text-xl text-amber-600";
                resultHint.classList.remove('hidden');
                resetBtn.classList.add('ring-2', 'ring-amber-300', 'border-amber-400');
            } else {
                resultCountNumber.className = "font-bold text-xl text-blue-600";
                resultHint.classList.add('hidden');
                resetBtn.classList.remove('ring-2', 'ring-amber-300', 'border-amber-400');
            }
            
            isInitialLoad = false;
        }

        function setupEventListeners() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            const toggleSidebar = () => {
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            };

            document.getElementById('openSidebarBtn').addEventListener('click', toggleSidebar);
            document.getElementById('closeSidebarBtn').addEventListener('click', toggleSidebar);
            overlay.addEventListener('click', toggleSidebar);

            // 檔案上傳加入大小限制驗證
            document.getElementById('csvFileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > MAX_FILE_SIZE) return updateStatus('✘ CSV 檔案過大 (請小於2MB)', true);
                
                updateStatus('正在處理 CSV...');
                const reader = new FileReader();
                reader.onload = e => { parseAndProcessCSV(e.target.result); checkAllDataLoaded(); };
                reader.readAsText(file);
            });

            document.getElementById('jsonFileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > MAX_FILE_SIZE * 5) return updateStatus('✘ JSON 檔案過大', true);

                updateStatus('正在處理 JSON...');
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if(!data.features || !Array.isArray(data.features)) throw new Error();
                        countyGeoJsonData = data;
                        drawBoundaries(countySelect.value);
                        checkAllDataLoaded();
                        updateStatus('✔ JSON 載入成功！');
                    } catch(err) { updateStatus('✘ JSON 格式錯誤', true); }
                };
                reader.readAsText(file);
            });

            countySelect.addEventListener('change', debounceRenderMap);
            
            resetBtn.addEventListener('click', () => {
                countySelect.value = 'all';
                document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = false);
                isInitialLoad = false; 
                renderMap();
            });
        }
    </script>
</body>
</html>
