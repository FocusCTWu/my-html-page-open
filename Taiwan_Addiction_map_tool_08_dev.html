<!DOCTYPE html>
<html>
<head>
    <title>TMAP 成癮醫療供需分析平台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --tm-navy: #1a2a6c; --tm-green: #28a745; --tm-gold: #ffc107; }
        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f7f6; }
        
        /* Header */
        header { background: var(--tm-navy); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
        
        /* Layout */
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 380px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .scroll-area { padding: 20px; overflow-y: auto; flex: 1; }
        .footer-area { padding: 15px; background: #f8f9fa; border-top: 1px solid #eee; }

        /* Step Styles */
        .step-item { margin-bottom: 25px; position: relative; }
        .step-header { display: flex; align-items: center; margin-bottom: 12px; }
        .step-num { background: var(--tm-navy); color: white; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; font-size: 12px; margin-right: 10px; }
        .step-title { font-weight: bold; color: var(--tm-navy); border-bottom: 2px solid #eee; flex: 1; padding-bottom: 3px; }
        
        .guide-text { font-size: 0.75rem; color: #666; display: block; margin: 5px 0 10px 32px; line-height: 1.4; }

        /* Input Styles */
        .input-block { margin-left: 32px; }
        .county-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9rem; }
        .county-row input { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: right; }
        
        .grade-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .grade-row input[type="color"] { width: 35px; height: 25px; border: none; cursor: pointer; }
        .grade-row input[type="number"] { width: 70px; }

        /* Map */
        #map-box { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* Buttons */
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .btn-apply { background: var(--tm-green); color: white; }
        .btn-apply:hover { background: #218838; }
        .btn-download { background: var(--tm-gold); color: #212529; font-size: 0.85rem; padding: 6px 15px; }

        /* Legend */
        .legend { background: white; padding: 12px; line-height: 22px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); font-size: 0.85rem; border: 1px solid #ddd; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 10px; opacity: 0.8; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <h2 style="margin:0; font-size:1.2rem;">TMAP center 成癮醫療供需分析平台 (由王聲昌醫師與吳靖則博士共同開發)</h2>
        <span id="mapStatus" class="status-badge" style="background:#6c757d; color:white;">偵測圖資中...</span>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
        <span style="font-size:0.85rem;">疊加醫院量能 (CSV):</span>
        <input type="file" id="clinicFile" accept=".csv" style="font-size:0.8rem; width:150px;">
        <button class="btn btn-download" onclick="downloadMap()">📥 下載成果 PNG</button>
    </div>
</header>

<main>
    <div id="sidebar">
        <div class="scroll-area">
            <div class="step-item">
                <div class="step-header">
                    <span class="step-num">1</span><span class="step-title">設定分析主題</span>
                </div>
                <div class="input-block">
                    <input type="text" id="dataLabel" value="毒品人口需求" style="width:100%; padding:8px; border-radius:4px; border:1px solid #ccc;">
                    <span class="guide-text">標題將顯示在圖例中，例如「個案人數」</span>
                </div>
            </div>

            <div class="step-item">
                <div class="step-header">
                    <span class="step-num">2</span><span class="step-title">圖資狀態</span>
                </div>
                <div class="input-block">
                    <div id="autoLoadSuccess" style="display:none; color: green; font-weight:bold; font-size:0.85rem;">✅ 同目錄圖資載入成功！</div>
                    <div id="autoLoadFail" style="display:none; color: #d9534f; border: 1px dashed #d9534f; padding: 10px; border-radius:5px;">
                        <strong>⚠️ 無法自動讀取圖資</strong><br>
                        <span style="font-size:0.75rem;">因瀏覽器安全限制，請手動選取：</span><br>
                        <input type="file" id="manualGeo" accept=".json" style="margin-top:5px; font-size:0.75rem;">
                    </div>
                </div>
            </div>

            <div class="step-item">
                <div class="step-header">
                    <span class="step-num">3</span><span class="step-title">自訂分級級距</span>
                </div>
                <div class="input-block" id="gradeConfig">
                    </div>
                <span class="guide-text">調整左側數值定義該縣市顏色之「門檻」</span>
            </div>

            <div class="step-item">
                <div class="step-header">
                    <span class="step-num">4</span><span class="step-title">各縣市數據輸入</span>
                </div>
                <div class="input-block" id="countyInputs">
                    </div>
            </div>
        </div>
        <div class="footer-area">
            <button class="btn-main btn-apply" onclick="applyChoropleth()">🚀 確定並更新地圖顏色</button>
        </div>
    </div>

    <div id="map-box">
        <div id="map"></div>
    </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

<script>
// --- 基礎資料 ---
const counties = ["基隆市", "臺北市", "新北市", "桃園市", "新竹市", "新竹縣", "苗栗縣", "臺中市", "彰化縣", "南投縣", "雲林縣", "嘉義市", "嘉義縣", "臺南市", "高雄市", "屏東縣", "宜蘭縣", "花蓮縣", "臺東縣", "澎湖縣", "金門縣", "連江縣"];
const MasterList = [
  { "name": "台北榮民總醫院", "lat": 25.1209, "lng": 121.5197 },
  { "name": "衛生福利部桃園療養院", "lat": 24.9785, "lng": 121.2725 },
  { "name": "衛生福利部草屯療養院", "lat": 23.9744, "lng": 120.6970 },
  { "name": "高雄市立凱旋醫院", "lat": 22.6231, "lng": 120.3235 },
  { "name": "衛生福利部花蓮醫院", "lat": 23.9772, "lng": 121.6094 }
];
const defGrades = [0, 100, 500, 1000, 2000, 5000];
const defColors = ['#FFEDA0', '#FED976', '#FEB24C', '#FD8D3C', '#FC4E2A', '#BD0026'];

// 初始化 UI
const gBox = document.getElementById('gradeConfig');
defGrades.forEach((g, i) => {
    gBox.innerHTML += `<div class="grade-row"><input type="color" id="c${i}" value="${defColors[i]}"><input type="number" id="g${i}" value="${g}"> <span>以上</span></div>`;
});

const cBox = document.getElementById('countyInputs');
counties.forEach(c => {
    cBox.innerHTML += `<div class="county-row"><label>${c}</label><input type="number" id="v-${c}" value="0"></div>`;
});

// 初始化地圖
const map = L.map('map').setView([23.6, 121.0], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: 'CartoDB' }).addTo(map);
let countyLayer, clinicLayer = L.layerGroup().addTo(map), colorLegend = L.control({position: 'bottomright'});

// --- 圖資自動讀取與手動備援 ---
async function tryAutoLoad() {
    try {
        const res = await fetch('./twCounty2010.geo.json');
        if (!res.ok) throw new Error();
        const data = await res.json();
        setupMap(data);
        document.getElementById('autoLoadSuccess').style.display = 'block';
        updateStatus("已載入", "#28a745");
    } catch (err) {
        document.getElementById('autoLoadFail').style.display = 'block';
        updateStatus("等待手動載入", "#dc3545");
    }
}

function setupMap(data) {
    if (countyLayer) map.removeLayer(countyLayer);
    countyLayer = L.geoJson(data, {
        style: { weight: 1.5, color: 'white', fillOpacity: 0.6, fillColor: '#eee' }
    }).addTo(map);
    updateStatus("圖資已就緒", "#28a745");
}

document.getElementById('manualGeo').addEventListener('change', e => {
    const r = new FileReader();
    r.onload = ev => setupMap(JSON.parse(ev.target.result));
    r.readAsText(e.target.files[0]);
});

function updateStatus(text, bg) {
    const s = document.getElementById('mapStatus');
    s.innerHTML = text; s.style.background = bg;
}

// 核心邏輯
function applyChoropleth() {
    if (!countyLayer) return alert("請先載入圖資！");
    const uGrades = [], uColors = [];
    for(let i=0; i<6; i++) {
        uGrades.push(parseInt(document.getElementById(`g${i}`).value) || 0);
        uColors.push(document.getElementById(`c${i}`).value);
    }
    const label = document.getElementById('dataLabel').value;

    countyLayer.eachLayer(layer => {
        let name = layer.feature.properties.COUNTYNAME.replace(/台/g, '臺').replace(/\s/g, '').replace(/[縣市]$/, '');
        const target = counties.find(c => c.replace(/台/g, '臺').replace(/[縣市]$/, '') === name);
        const val = parseInt(document.getElementById(`v-${target}`)?.value || 0);

        if (val > 0) {
            let color = uColors[0];
            for(let i=5; i>=0; i--) { if(val >= uGrades[i]) { color = uColors[i]; break; } }
            layer.setStyle({ fillColor: color, fillOpacity: 0.85 });
            layer.bindTooltip(`<b>${target}</b><br>${label}: ${val}`, { sticky: true });
        } else {
            layer.setStyle({ fillColor: '#eee', fillOpacity: 0.4 });
        }
    });
    drawLegend(label, uGrades, uColors);
}

function drawLegend(label, g, c) {
    colorLegend.remove(map);
    colorLegend.onAdd = () => {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `<strong>${label}</strong><br><i style="background:#eee"></i> 0 (未輸入)<br>`;
        g.forEach((v, i) => { div.innerHTML += `<i style="background:${c[i]}"></i> ${v}${g[i+1] ? '&ndash;'+g[i+1] : '+'}<br>`; });
        return div;
    };
    colorLegend.addTo(map);
}

document.getElementById('clinicFile').addEventListener('change', e => {
    Papa.parse(e.target.files[0], { header: true, complete: results => {
        clinicLayer.clearLayers();
        results.data.forEach(row => {
            const n = row.院所名稱?.trim() || "";
            const inst = MasterList.find(m => m.name.includes(n) || n.includes(m.name));
            if (inst && !isNaN(parseInt(row.人數))) {
                L.circleMarker([inst.lat, inst.lng], { radius: Math.sqrt(row.人數)*2.5, fillColor: "#007bff", color: "#fff", weight: 2, fillOpacity: 0.8 }).addTo(clinicLayer);
            }
        });
    }});
});

function downloadMap() {
    domtoimage.toPng(document.getElementById('map')).then(url => {
        const a = document.createElement('a'); a.download = 'TMAP_Analysis.png'; a.href = url; a.click();
    });
}

tryAutoLoad();
drawLegend("數據類別", defGrades, defColors);
</script>
</body>
</html>
